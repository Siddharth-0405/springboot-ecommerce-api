version: "3.9"

networks:
  backend-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

services:

  postgres:
    image: postgres:16-alpine
    container_name: product-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-productdb}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-productdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: product-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  product-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: product-service
    restart: unless-stopped
    environment:
      DB_HOST:              postgres
      DB_PORT:              5432
      DB_NAME:              ${DB_NAME:-productdb}
      DB_USER:              ${DB_USER:-postgres}
      DB_PASSWORD:          ${DB_PASSWORD:-postgres}
      REDIS_HOST:           redis
      REDIS_PORT:           6379
      REDIS_PASSWORD:       ${REDIS_PASSWORD:-}
      JWT_SECRET:           ${JWT_SECRET:-your_jwt_secret_key_here_must_be_64_characters_long_replace_this}
      JWT_EXPIRATION:       ${JWT_EXPIRATION:-86400000}
      MAIL_HOST:            ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT:            ${MAIL_PORT:-587}
      MAIL_USERNAME:        ${MAIL_USERNAME:-your-email@gmail.com}
      MAIL_PASSWORD:        ${MAIL_PASSWORD:-your-app-password}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
    ports:
      - "8080:8080"
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
